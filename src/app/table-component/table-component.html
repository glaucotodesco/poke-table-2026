<table class="table">
  <thead>
    <tr>
      <th scope="col">Id</th>
      <th scope="col">Name</th>
      <th scope="col">Height</th>
      <th scope="col">Weight</th>
      <th scope="col">Image</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let p of pokemons()">
      <td>{{p.id}}</td>
      <td>{{p.name}}</td>
      <td>{{p.height}}</td>
      <td>{{p.weight}}</td>
      <td><img [src]="p.sprites.front_default" [alt]="p.name" width="100" height="100"></td>
    </tr>
   </tbody>
</table>
